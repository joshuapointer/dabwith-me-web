<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="dabwith.me — Bub mark, mono dark">
  <title>dabwith.me — Bub (mono dark)</title>
  <!-- Use this on light backgrounds: 1-color silhouette + knock-out eyes/cheeks -->
  <circle cx="120" cy="120" r="100" fill="oklch(30% 0.04 300)"/>
  <!-- Eyes are punched out (lighter so they read on the dark body without re-introducing color) -->
  <ellipse cx="92"  cy="128" rx="14" ry="18" fill="oklch(99% 0.005 320)" fill-opacity="0.92"/>
  <ellipse cx="148" cy="128" rx="14" ry="18" fill="oklch(99% 0.005 320)" fill-opacity="0.92"/>
  <!-- Cheek hint (single-tone, ~12% body width) -->
  <ellipse cx="58"  cy="148" rx="13" ry="8" fill="oklch(99% 0.005 320)" fill-opacity="0.18"/>
  <ellipse cx="182" cy="148" rx="13" ry="8" fill="oklch(99% 0.005 320)" fill-opacity="0.18"/>
</svg>
