<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-label="dabwith.me — stacked lockup">
  <title>dabwith.me — stacked lockup</title>
  <defs>
    <radialGradient id="ls_halo" cx="50%" cy="50%" r="50%">
      <stop offset="0"    stop-color="oklch(85% 0.10 30)" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="oklch(85% 0.10 30)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ls_body" cx="65%" cy="72%" r="62%">
      <stop offset="0"   stop-color="oklch(80% 0.14 30)"/>
      <stop offset="0.7" stop-color="oklch(88% 0.06 320)"/>
      <stop offset="1"   stop-color="oklch(85% 0.04 320)"/>
    </radialGradient>
    <radialGradient id="ls_hi" cx="32%" cy="28%" r="36%">
      <stop offset="0" stop-color="oklch(99% 0.02 320)" stop-opacity="0.95"/>
      <stop offset="1" stop-color="oklch(99% 0.02 320)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ls_innershadow" cx="50%" cy="100%" r="65%">
      <stop offset="0"    stop-color="oklch(60% 0.10 320)" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="oklch(60% 0.10 320)" stop-opacity="0.08"/>
      <stop offset="1"    stop-color="oklch(60% 0.10 320)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ls_cheek">
      <stop offset="0"   stop-color="oklch(80% 0.16 25)" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="oklch(80% 0.16 25)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ls_eyehi" cx="40%" cy="30%" r="30%">
      <stop offset="0" stop-color="oklch(99% 0.005 320)" stop-opacity="0.92"/>
      <stop offset="1" stop-color="oklch(99% 0.005 320)" stop-opacity="0"/>
    </radialGradient>
    <filter id="ls_blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="ls_clip"><circle cx="400" cy="240" r="200"/></clipPath>
  </defs>

  <!-- Mark, centered -->
  <g>
    <circle cx="400" cy="240" r="240" fill="url(#ls_halo)"/>
    <circle cx="400" cy="240" r="200" fill="url(#ls_body)"/>
    <circle cx="400" cy="240" r="200" fill="url(#ls_hi)"/>
    <circle cx="400" cy="240" r="200" fill="url(#ls_innershadow)"/>
    <g clip-path="url(#ls_clip)">
      <ellipse cx="277" cy="296" rx="34" ry="22" fill="url(#ls_cheek)" filter="url(#ls_blur)"/>
      <ellipse cx="523" cy="296" rx="34" ry="22" fill="url(#ls_cheek)" filter="url(#ls_blur)"/>
    </g>
    <ellipse cx="343" cy="256" rx="28" ry="36" fill="oklch(28% 0.04 290)"/>
    <ellipse cx="457" cy="256" rx="28" ry="36" fill="oklch(28% 0.04 290)"/>
    <ellipse cx="335" cy="241" rx="8.7" ry="12" fill="url(#ls_eyehi)"/>
    <ellipse cx="449" cy="241" rx="8.7" ry="12" fill="url(#ls_eyehi)"/>
    <circle cx="400" cy="240" r="200" fill="none" stroke="oklch(70% 0.06 320)" stroke-opacity="0.25" stroke-width="1.2"/>
  </g>

  <!-- Wordmark, below -->
  <text x="400" y="640" text-anchor="middle"
        font-family="'SF Pro Rounded', -apple-system, BlinkMacSystemFont, 'Hubot Sans', system-ui, sans-serif"
        font-weight="700"
        font-size="160"
        letter-spacing="-5.6"
        fill="oklch(30% 0.04 300)">dabwith<tspan fill="oklch(75% 0.18 30)" font-weight="800">.me</tspan></text>
</svg>
