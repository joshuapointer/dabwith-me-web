<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="dabwith.me — Android splash">
  <title>dabwith.me — Android splash (1080×1920)</title>
  <defs>
    <radialGradient id="spa_bg1" cx="30%" cy="14%" r="55%">
      <stop offset="0" stop-color="oklch(94% 0.06 320)" stop-opacity="0.55"/>
