  <rect width="1080" height="1920" fill="oklch(97% 0.025 320)"/>
  <rect width="1080" height="1920" fill="url(#spa_bg1)"/>
  <rect width="1080" height="1920" fill="url(#spa_bg2)"/>
  <rect width="1080" height="1920" fill="url(#spa_bg3)"/>

  <circle cx="540" cy="820" r="360" fill="url(#spa_halo)"/>
  <circle cx="540" cy="820" r="290" fill="url(#spa_body)"/>
  <circle cx="540" cy="820" r="290" fill="url(#spa_hi)"/>
  <circle cx="540" cy="820" r="290" fill="url(#spa_innershadow)"/>
  <g clip-path="url(#spa_clip)">
    <ellipse cx="362" cy="900" rx="50" ry="32" fill="url(#spa_cheek)" filter="url(#spa_blur)"/>
    <ellipse cx="718" cy="900" rx="50" ry="32" fill="url(#spa_cheek)" filter="url(#spa_blur)"/>
  </g>
  <ellipse cx="458" cy="844" rx="42" ry="54" fill="oklch(28% 0.04 290)"/>
  <ellipse cx="622" cy="844" rx="42" ry="54" fill="oklch(28% 0.04 290)"/>
  <ellipse cx="446" cy="821" rx="13" ry="17" fill="url(#spa_eyehi)"/>
  <ellipse cx="610" cy="821" rx="13" ry="17" fill="url(#spa_eyehi)"/>

  <text x="540" y="1280" text-anchor="middle"
